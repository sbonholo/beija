# TestFlight release pipeline — skeleton, mostly disabled until secrets are set up.
#
# Enable by:
#   1) Provisioning an App Store Connect API key (.p8 + key_id + issuer_id)
#   2) Adding secrets to the repo:
#        APP_STORE_CONNECT_API_KEY_ID
#        APP_STORE_CONNECT_API_ISSUER_ID
#        APP_STORE_CONNECT_API_KEY (base64 .p8 contents)
#        FASTLANE_USER (Apple ID)
#        FASTLANE_PASSWORD (app-specific password)
#        MATCH_PASSWORD (if using fastlane match for signing)
#   3) Uncommenting the steps below.

name: Release to TestFlight

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump (patch / minor / major)'
        required: false
        default: 'patch'

jobs:
  release:
    name: Build + upload to TestFlight
    runs-on: macos-14
    # if: false  # remove this to actually run
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Setup Ruby (for fastlane)
      #   uses: ruby/setup-ruby@v1
      #   with:
      #     ruby-version: 3.2
      #     bundler-cache: true
      #     working-directory: fastlane

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web bundle
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_IOS_CLIENT_ID: ${{ secrets.VITE_GOOGLE_IOS_CLIENT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync ios

      # - name: Install CocoaPods
      #   working-directory: frontend/ios/App
      #   run: pod install

      # - name: Decode App Store Connect API key
      #   run: |
      #     mkdir -p ~/.appstoreconnect/private_keys
      #     echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 -d > \
      #       ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      # - name: Build & upload via fastlane
      #   working-directory: fastlane
      #   env:
      #     APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      #     APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      #     FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
      #     FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
      #     MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      #   run: bundle exec fastlane beta

      - name: Placeholder reminder
        run: |
          echo "TestFlight pipeline is a skeleton. Set secrets and uncomment fastlane steps." >&2
          exit 0

name: Deploy to Vercel

# Publica o frontend no Vercel a cada push em main + manual.
# Requer 3 secrets no repo (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — token de API pessoal (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID      — vem do `vercel link` (vercel.com/<org>/~/settings)
#   VERCEL_PROJECT_ID  — vem do `vercel link`
#
# Sem qualquer um dos 3, o job pula com aviso — nada quebra.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Vercel deploy
    runs-on: ubuntu-latest
    # Pula gracefulmente quando os secrets não estão configurados (PR de
    # contribuidor externo, primeiro push antes do setup, etc.).
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.repository == 'sbonholo/beija') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Vercel secrets
        id: check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::warning::Vercel secrets not set — pulando deploy. Veja docs/DEPLOY.md."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check.outputs.skip == 'false'
        run: npm install -g vercel@latest

      - name: Pull Vercel env (preview ou production)
        if: steps.check.outputs.skip == 'false'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
            echo "VERCEL_ENV=production" >> $GITHUB_ENV
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
            echo "VERCEL_ENV=preview" >> $GITHUB_ENV
          fi

      - name: Build with Vercel
        if: steps.check.outputs.skip == 'false'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "$VERCEL_ENV" = "production" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy to Vercel
        if: steps.check.outputs.skip == 'false'
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "$VERCEL_ENV" = "production" ]; then
            url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "## 🚀 Vercel deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: \`$VERCEL_ENV\`" >> $GITHUB_STEP_SUMMARY
          echo "URL: $url" >> $GITHUB_STEP_SUMMARY

      - name: Comment preview URL on PR
        if: steps.check.outputs.skip == 'false' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `🚀 **Preview Vercel**: ${url}\n\nTeste no celular escaneando o QR code do link.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith('🚀 **Preview Vercel**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

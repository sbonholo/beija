name: Lighthouse audit

# Non-blocking informational job. Runs Lighthouse against the built preview
# server and reports scores in the run summary. Targets (soft) per
# docs/ACCESSIBILITY.md: Performance ≥ 85, Accessibility ≥ 95, Best
# Practices ≥ 90, SEO ≥ 90. Failing scores don't break the build today —
# flip `continue-on-error: false` once the team commits to a hard SLO.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse (mobile)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      - name: Start preview server
        run: |
          npx vite preview --port 4173 --host 0.0.0.0 &
          npx wait-on http://localhost:4173 --timeout 60000
      - name: Run Lighthouse
        run: |
          npx --yes @lhci/cli@0.14.x autorun \
            --collect.url=http://localhost:4173/ \
            --collect.url=http://localhost:4173/signin \
            --collect.url=http://localhost:4173/community-guidelines \
            --collect.settings.preset=mobile \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage || true
      - name: Summary
        run: |
          echo "## Lighthouse" >> $GITHUB_STEP_SUMMARY
          echo "Targets: Performance ≥ 85, Accessibility ≥ 95, Best Practices ≥ 90, SEO ≥ 90" >> $GITHUB_STEP_SUMMARY
          echo "Full report uploaded to temporary public storage — see job log for URL." >> $GITHUB_STEP_SUMMARY
